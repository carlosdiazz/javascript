<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Cartas</title>

    <link rel="stylesheet" href="./assets/css/styles.css">

<body class="fondo">

            </div>
        
         
        <div class=" container row">
            <h1 class="text-center">Jugador 1 - <small>0</small></h1>
            <div id="jugador-carta">

        </div>

        <div class=" container row">
            <h1 class="text-center mt-5">Computadora - <small>0</small></h1>
            <div id="computadora-carta">
                <img class="carta " src="/assets/img/cartas/10D.png">
    
            </div>
        </div>

    </div>




    <script src="./assets/js/juego.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4" crossorigin="anonymous"></script>
